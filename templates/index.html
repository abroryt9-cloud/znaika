<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Знайка — твой умный помощник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2.2rem;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            letter-spacing: 1px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-name {
            color: white;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .clear-btn {
            background: rgba(255, 59, 48, 0.8);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .clear-btn:hover {
            background: rgba(255, 59, 48, 1);
            transform: scale(1.02);
        }

        /* Основной контейнер */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Левая колонка */
        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 25px 20px;
            color: white;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            overflow-y: auto;
        }

        .mode-selector h3, .history h3 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            font-weight: 600;
        }

        .mode-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            text-align: left;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
            border-color: rgba(255, 215, 0, 0.5);
        }

        .mode-btn.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .emoji {
            font-size: 1.4rem;
        }

        .history-list {
            margin-top: 15px;
        }

        .history-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(3px);
        }

        /* Правая колонка - чат */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .chat-header {
            padding: 25px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .chat-header h2 {
            margin-bottom: 8px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .mode-description {
            opacity: 0.8;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 15px;
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .bot-message .avatar {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #333;
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.3);
        }

        .user-message .avatar {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        .message-content {
            padding: 15px 20px;
            border-radius: 22px;
            color: white;
            line-height: 1.6;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .bot-message .message-content {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom-left-radius: 5px;
        }

        .user-message .message-content {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            border-bottom-right-radius: 5px;
        }

        /* Поле ввода */
        .chat-input-area {
            padding: 25px 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .chat-input-area textarea {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
            line-height: 1.5;
            max-height: 120px;
        }

        .chat-input-area textarea:focus {
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        .chat-input-area textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .send-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            border: none;
            color: #333;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Индикатор печатания */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .header {
                padding: 1rem;
            }
            
            .logo-text {
                font-size: 1.5rem;
            }
            
            .chat-messages {
                padding: 20px;
            }
            
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">📚</span>
            <span class="logo-text">Знайка</span>
        </div>
        <div class="user-info">
            <span class="user-name" id="userGreeting">Привет!</span>
            <button class="clear-btn" onclick="clearHistory()" title="Очистить историю">
                🗑️ Очистить
            </button>
        </div>
    </header>

    <div class="main-container">
        <!-- Левая колонка с режимами -->
        <aside class="sidebar">
            <div class="mode-selector">
                <h3>Что будем делать?</h3>
                <button class="mode-btn active" data-mode="tutor">
                    <span class="emoji">📚</span> Репетитор
                </button>
                <button class="mode-btn" data-mode="essay">
                    <span class="emoji">✍️</span> Сочинения
                </button>
                <button class="mode-btn" data-mode="solver">
                    <span class="emoji">🧮</span> Решатель
                </button>
                <button class="mode-btn" data-mode="translate">
                    <span class="emoji">🌍</span> Переводчик
                </button>
                <button class="mode-btn" data-mode="summary">
                    <span class="emoji">📖</span> Краткое содержание
                </button>
                <button class="mode-btn" data-mode="ideas">
                    <span class="emoji">💡</span> Генератор идей
                </button>
            </div>
            
            <div class="history">
                <h3>Недавние диалоги</h3>
                <div class="history-list" id="historyList">
                    <!-- Сюда будут добавляться диалоги -->
                </div>
            </div>
        </aside>

        <!-- Правая колонка с чатом -->
        <main class="chat-area">
            <div class="chat-header">
                <h2 id="modeTitle">📚 Репетитор</h2>
                <p class="mode-description" id="modeDescription">
                    Спроси меня о чём угодно по учёбе
                </p>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- Приветственное сообщение -->
                <div class="message bot-message">
                    <div class="avatar">🤖</div>
                    <div class="message-content">
                        Привет! Я Знайка — твой умный помощник. Выбери режим слева и задавай вопросы 😊
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="userInput" 
                        placeholder="Напиши свой вопрос..." 
                        rows="1"
                    ></textarea>
                </div>
                <button id="sendButton" class="send-btn" title="Отправить">
                    <span>➤</span>
                </button>
            </div>
        </main>
    </div>

    <script>
        // Состояние приложения
        let currentMode = 'tutor';
        let sessionId = 'session_' + Date.now();
        let chatHistory = [];
        let isProcessing = false;

        // Описания режимов
        const modeInfo = {
            tutor: {
                name: '📚 Репетитор',
                desc: 'Спроси меня о чём угодно по учёбе'
            },
            essay: {
                name: '✍️ Сочинения',
                desc: 'Помогу с идеями и проверю ошибки'
            },
            solver: {
                name: '🧮 Решатель',
                desc: 'Разберу любую задачу по шагам'
            },
            translate: {
                name: '🌍 Переводчик',
                desc: 'Переведу текст на любой язык'
            },
            summary: {
                name: '📖 Краткое содержание',
                desc: 'Сделаю саммари книги или статьи'
            },
            ideas: {
                name: '💡 Генератор идей',
                desc: 'Помогу придумать что угодно'
            }
        };

        // Переключение режимов
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                currentMode = this.dataset.mode;
                
                document.getElementById('modeTitle').textContent = modeInfo[currentMode].name;
                document.getElementById('modeDescription').textContent = modeInfo[currentMode].desc;
            });
        });

        // Отправка сообщения
        document.getElementById('sendButton').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Авто-расширение textarea
        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        async function sendMessage() {
            if (isProcessing) return;
            
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            isProcessing = true;
            
            // Добавляем сообщение пользователя
            addMessage(message, 'user');
            
            input.value = '';
            input.style.height = 'auto';
            
            // Показываем индикатор печатания
            showTypingIndicator();
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        mode: currentMode,
                        session_id: sessionId
                    })
                });
                
                const data = await response.json();
                
                hideTypingIndicator();
                
                if (data.response) {
                    addMessage(data.response, 'bot');
                    chatHistory.push({ user: message, bot: data.response });
                    updateHistoryList();
                } else if (data.error) {
                    addMessage(`❌ Ошибка: ${data.error}`, 'bot');
                }
                
            } catch (error) {
                hideTypingIndicator();
                addMessage('❌ Ошибка соединения. Попробуй ещё раз.', 'bot');
            } finally {
                isProcessing = false;
            }
        }

        function addMessage(text, sender) {
            const messages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender === 'user' ? 'user-message' : 'bot-message'}`;
            
            const avatar = sender === 'user' ? '👤' : '🤖';
            
            messageDiv.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="message-content">${escapeHtml(text)}</div>
            `;
            
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function showTypingIndicator() {
            const messages = document.getElementById('chatMessages');
            const indicator = document.createElement('div');
            indicator.className = 'message bot-message';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messages.appendChild(indicator);
            messages.scrollTop = messages.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function updateHistoryList() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            chatHistory.slice(-5).reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.textContent = item.user.substring(0, 40) + (item.user.length > 40 ? '...' : '');
                div.onclick = () => addMessage(item.user, 'user');
                historyList.appendChild(div);
            });
        }

        async function clearHistory() {
            if (!confirm('Очистить историю?')) return;
            
            try {
                await fetch('/clear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
                
                document.getElementById('chatMessages').innerHTML = `
                    <div class="message bot-message">
                        <div class="avatar">🤖</div>
                        <div class="message-content">История очищена. Начнём заново! 😊</div>
                    </div>
                `;
                chatHistory = [];
                updateHistoryList();
                
            } catch (error) {
                addMessage('❌ Ошибка при очистке', 'bot');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Приветствие в зависимости от времени
        const hour = new Date().getHours();
        let greeting = 'Привет';
        if (hour < 12) greeting = 'Доброе утро';
        else if (hour < 18) greeting = 'Добрый день';
        else greeting = 'Добрый вечер';
        document.getElementById('userGreeting').textContent = `${greeting}!`;
    </script>
</body>
</html>
